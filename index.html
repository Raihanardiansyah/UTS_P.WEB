<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WebSocket Live Sensor Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;600;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0a0c0f;
      --panel: #111418;
      --border: #1e2530;
      --accent: #00e5ff;
      --accent2: #ff6b35;
      --warn: #ffd600;
      --danger: #ff1744;
      --ok: #00e676;
      --text: #cdd6e0;
      --muted: #4a5568;
      --mono: 'Share Tech Mono', monospace;
      --sans: 'Barlow Condensed', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      padding: 24px;
      position: relative;
      overflow-x: hidden;
    }

    /* Grid scanline overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,229,255,0.015) 2px,
        rgba(0,229,255,0.015) 4px
      );
      pointer-events: none;
      z-index: 0;
    }

    .wrapper { position: relative; z-index: 1; max-width: 960px; margin: 0 auto; }

    /* HEADER */
    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 32px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 16px;
    }

    .header-title {
      font-size: 11px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 4px;
      font-family: var(--mono);
    }

    h1 {
      font-size: 42px;
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1;
      text-transform: uppercase;
      color: #fff;
    }

    h1 span { color: var(--accent); }

    .conn-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--mono);
      font-size: 12px;
      padding: 8px 16px;
      border: 1px solid var(--border);
      background: var(--panel);
    }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.3s;
    }
    .dot.connected { background: var(--ok); box-shadow: 0 0 8px var(--ok); animation: pulse 2s infinite; }
    .dot.connecting { background: var(--warn); box-shadow: 0 0 8px var(--warn); }
    .dot.disconnected { background: var(--danger); }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* METRICS GRID */
    .metrics {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }

    .metric-card {
      background: var(--panel);
      border: 1px solid var(--border);
      padding: 24px 20px 20px;
      position: relative;
      overflow: hidden;
      transition: border-color 0.3s;
    }

    .metric-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: var(--accent);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.4s ease;
    }

    .metric-card.updated::before { transform: scaleX(1); }
    .metric-card.updated { border-color: rgba(0,229,255,0.3); }

    .metric-label {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      font-family: var(--mono);
      margin-bottom: 12px;
    }

    .metric-value {
      font-family: var(--mono);
      font-size: 48px;
      line-height: 1;
      color: #fff;
      transition: color 0.3s;
    }

    .metric-value.warn { color: var(--warn); }
    .metric-value.danger { color: var(--danger); }

    .metric-unit {
      font-size: 14px;
      color: var(--muted);
      font-family: var(--mono);
      margin-top: 4px;
    }

    .metric-delta {
      position: absolute;
      bottom: 16px; right: 16px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
    }

    /* STATUS BAR */
    .status-bar {
      background: var(--panel);
      border: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
      font-family: var(--mono);
      font-size: 12px;
    }

    .status-label { color: var(--muted); text-transform: uppercase; letter-spacing: 0.15em; }

    .status-value {
      font-size: 14px;
      font-weight: 700;
      padding: 2px 12px;
      letter-spacing: 0.15em;
    }

    .status-value.NORMAL { color: var(--ok); border: 1px solid var(--ok); }
    .status-value.PERINGATAN { color: var(--warn); border: 1px solid var(--warn); }
    .status-value.BAHAYA { color: var(--danger); border: 1px solid var(--danger); animation: blink 0.5s step-end infinite; }

    @keyframes blink { 50% { opacity: 0.3; } }

    .status-ts { color: var(--muted); margin-left: auto; }

    /* CHART */
    .chart-section {
      background: var(--panel);
      border: 1px solid var(--border);
      padding: 20px;
      margin-bottom: 24px;
    }

    .chart-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .chart-title {
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      font-family: var(--mono);
    }

    canvas { display: block; width: 100% !important; }

    /* LOG */
    .log-section {
      background: var(--panel);
      border: 1px solid var(--border);
      padding: 20px;
    }

    .log-header {
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      font-family: var(--mono);
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
    }

    .log-entries {
      height: 160px;
      overflow-y: auto;
      font-family: var(--mono);
      font-size: 11px;
    }

    .log-entry {
      padding: 3px 0;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 12px;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateX(-8px); } to { opacity: 1; transform: none; } }

    .log-time { color: var(--muted); min-width: 90px; }
    .log-msg { color: var(--text); }
    .log-msg.ok { color: var(--ok); }
    .log-msg.warn { color: var(--warn); }
    .log-msg.err { color: var(--danger); }

    /* CONTROLS */
    .controls { display: flex; gap: 12px; margin-bottom: 20px; }

    button {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 8px 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      cursor: pointer;
      transition: all 0.2s;
    }

    button:hover { border-color: var(--accent); color: var(--accent); }
    button.primary { border-color: var(--accent); color: var(--accent); }
    button.primary:hover { background: var(--accent); color: var(--bg); }
    button.danger { border-color: var(--danger); color: var(--danger); }

    .log-entries::-webkit-scrollbar { width: 4px; }
    .log-entries::-webkit-scrollbar-track { background: var(--bg); }
    .log-entries::-webkit-scrollbar-thumb { background: var(--border); }
  </style>
</head>
<body>
<div class="wrapper">
  <header>
    <div>
      <div class="header-title">Eksperimen WebSocket &mdash; Real-Time Sensor</div>
      <h1>LIVE <span>SENSOR</span> DASHBOARD</h1>
    </div>
    <div class="conn-badge">
      <div class="dot" id="dot"></div>
      <span id="conn-label">MENGHUBUNGKAN...</span>
    </div>
  </header>

  <div class="controls">
    <button class="primary" id="btn-connect">HUBUNGKAN</button>
    <button id="btn-reset">RESET SENSOR</button>
    <button class="danger" id="btn-disconnect">PUTUSKAN</button>
  </div>

  <div class="metrics">
    <div class="metric-card" id="card-suhu">
      <div class="metric-label">🌡 Suhu</div>
      <div class="metric-value" id="val-suhu">--.-</div>
      <div class="metric-unit">°Celsius</div>
      <div class="metric-delta" id="delta-suhu">—</div>
    </div>
    <div class="metric-card" id="card-kelembaban">
      <div class="metric-label">💧 Kelembaban</div>
      <div class="metric-value" id="val-kelembaban">--.-</div>
      <div class="metric-unit">% RH</div>
      <div class="metric-delta" id="delta-kelembaban">—</div>
    </div>
    <div class="metric-card" id="card-tekanan">
      <div class="metric-label">🔵 Tekanan</div>
      <div class="metric-value" id="val-tekanan">---.-</div>
      <div class="metric-unit">hPa</div>
      <div class="metric-delta" id="delta-tekanan">—</div>
    </div>
  </div>

  <div class="status-bar">
    <span class="status-label">Status Sistem</span>
    <span class="status-value NORMAL" id="status-badge">—</span>
    <span class="status-ts" id="last-update">Belum ada data</span>
  </div>

  <div class="chart-section">
    <div class="chart-header">
      <span class="chart-title">📈 Grafik Suhu Real-Time (50 titik terakhir)</span>
    </div>
    <canvas id="tempChart" height="120"></canvas>
  </div>

  <div class="log-section">
    <div class="log-header">
      <span>📋 Log Koneksi WebSocket</span>
      <span id="msg-count">0 pesan</span>
    </div>
    <div class="log-entries" id="log"></div>
  </div>
</div>

<script>
  // ─── Mini Chart ─────────────────────────────────────────────────────────────
  const canvas = document.getElementById('tempChart');
  const ctx = canvas.getContext('2d');
  const MAX_POINTS = 50;
  const tempHistory = [];

  function resizeCanvas() {
    canvas.width = canvas.parentElement.offsetWidth - 40;
    canvas.height = 120;
    drawChart();
  }

  function drawChart() {
    const W = canvas.width, H = canvas.height;
    ctx.clearRect(0, 0, W, H);

    if (tempHistory.length < 2) return;

    const min = Math.min(...tempHistory) - 2;
    const max = Math.max(...tempHistory) + 2;

    // Grid lines
    ctx.strokeStyle = '#1e2530';
    ctx.lineWidth = 1;
    for (let i = 0; i <= 4; i++) {
      const y = H - (i / 4) * H;
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
      ctx.fillStyle = '#4a5568';
      ctx.font = '10px Share Tech Mono';
      ctx.fillText(`${(min + (i/4)*(max-min)).toFixed(1)}°`, 4, y - 3);
    }

    // Gradient fill
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, 'rgba(0,229,255,0.3)');
    grad.addColorStop(1, 'rgba(0,229,255,0)');

    const toX = (i) => (i / (MAX_POINTS - 1)) * W;
    const toY = (v) => H - ((v - min) / (max - min)) * H;

    ctx.beginPath();
    tempHistory.forEach((v, i) => {
      i === 0 ? ctx.moveTo(toX(i), toY(v)) : ctx.lineTo(toX(i), toY(v));
    });
    ctx.lineTo(toX(tempHistory.length - 1), H);
    ctx.lineTo(0, H);
    ctx.closePath();
    ctx.fillStyle = grad;
    ctx.fill();

    // Line
    ctx.beginPath();
    tempHistory.forEach((v, i) => {
      i === 0 ? ctx.moveTo(toX(i), toY(v)) : ctx.lineTo(toX(i), toY(v));
    });
    ctx.strokeStyle = '#00e5ff';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Last point dot
    const last = tempHistory[tempHistory.length - 1];
    ctx.beginPath();
    ctx.arc(toX(tempHistory.length - 1), toY(last), 4, 0, Math.PI * 2);
    ctx.fillStyle = '#00e5ff';
    ctx.fill();
  }

  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();

  // ─── Logging ─────────────────────────────────────────────────────────────────
  let msgCount = 0;
  function addLog(msg, type = '') {
    const log = document.getElementById('log');
    const now = new Date().toLocaleTimeString('id-ID');
    const el = document.createElement('div');
    el.className = 'log-entry';
    el.innerHTML = `<span class="log-time">${now}</span><span class="log-msg ${type}">${msg}</span>`;
    log.prepend(el);
    if (log.children.length > 100) log.lastChild.remove();
    msgCount++;
    document.getElementById('msg-count').textContent = `${msgCount} pesan`;
  }

  // ─── Card flash animation ─────────────────────────────────────────────────
  function flashCard(id) {
    const card = document.getElementById(id);
    card.classList.remove('updated');
    void card.offsetWidth;
    card.classList.add('updated');
    setTimeout(() => card.classList.remove('updated'), 500);
  }

  // ─── WebSocket State ─────────────────────────────────────────────────────────
  let ws = null;
  let prevData = {};

  function setConnStatus(state) {
    const dot = document.getElementById('dot');
    const label = document.getElementById('conn-label');
    dot.className = 'dot ' + state;
    const labels = { connected: 'TERHUBUNG', connecting: 'MENGHUBUNGKAN...', disconnected: 'TERPUTUS' };
    label.textContent = labels[state] || state.toUpperCase();
  }

  function connect() {
    if (ws && ws.readyState < 2) { addLog('Sudah terhubung.', 'warn'); return; }
    setConnStatus('connecting');
    addLog('Mencoba terhubung ke ws://localhost:8080...', '');

    ws = new WebSocket('ws://localhost:8080');

    ws.onopen = () => {
      setConnStatus('connected');
      addLog('✅ Koneksi WebSocket berhasil!', 'ok');
    };

    ws.onmessage = (event) => {
      const data = JSON.parse(event.data);

      if (data.type === 'welcome') {
        addLog(`🤝 Server: ${data.message}`, 'ok');
        return;
      }

      if (data.type === 'info') {
        addLog(`ℹ️ ${data.message}`, '');
        return;
      }

      if (data.type === 'sensor_data') {
        // Update suhu
        const dSuhu = prevData.suhu ? (data.suhu - prevData.suhu).toFixed(2) : null;
        document.getElementById('val-suhu').textContent = data.suhu.toFixed(2);
        document.getElementById('val-suhu').className = 'metric-value' + (data.status === 'BAHAYA' ? ' danger' : data.status === 'PERINGATAN' ? ' warn' : '');
        if (dSuhu !== null) document.getElementById('delta-suhu').textContent = (dSuhu > 0 ? '+' : '') + dSuhu + '°';
        flashCard('card-suhu');

        // Update kelembaban
        const dHum = prevData.kelembaban ? (data.kelembaban - prevData.kelembaban).toFixed(2) : null;
        document.getElementById('val-kelembaban').textContent = data.kelembaban.toFixed(2);
        if (dHum !== null) document.getElementById('delta-kelembaban').textContent = (dHum > 0 ? '+' : '') + dHum + '%';
        flashCard('card-kelembaban');

        // Update tekanan
        const dTek = prevData.tekanan ? (data.tekanan - prevData.tekanan).toFixed(2) : null;
        document.getElementById('val-tekanan').textContent = data.tekanan.toFixed(2);
        if (dTek !== null) document.getElementById('delta-tekanan').textContent = (dTek > 0 ? '+' : '') + dTek + ' hPa';
        flashCard('card-tekanan');

        // Status badge
        const badge = document.getElementById('status-badge');
        badge.textContent = data.status;
        badge.className = 'status-value ' + data.status;

        // Timestamp
        const ts = new Date(data.timestamp).toLocaleTimeString('id-ID');
        document.getElementById('last-update').textContent = `Update terakhir: ${ts}`;

        // Chart
        tempHistory.push(data.suhu);
        if (tempHistory.length > MAX_POINTS) tempHistory.shift();
        drawChart();

        // Log singkat tiap 5 pesan
        if (msgCount % 5 === 0) {
          addLog(`📡 Suhu: ${data.suhu}°C | Kelembaban: ${data.kelembaban}% | Tekanan: ${data.tekanan} hPa`, '');
        }

        prevData = data;
        msgCount++;
        document.getElementById('msg-count').textContent = `${msgCount} pesan`;
      }
    };

    ws.onclose = (e) => {
      setConnStatus('disconnected');
      addLog(`❌ Koneksi ditutup. Kode: ${e.code}`, 'err');
    };

    ws.onerror = () => {
      addLog('⚠️ Error: Gagal terhubung. Pastikan server.js berjalan!', 'err');
    };
  }

  document.getElementById('btn-connect').onclick = connect;
  document.getElementById('btn-disconnect').onclick = () => {
    if (ws) { ws.close(); addLog('Koneksi diputus secara manual.', 'warn'); }
  };
  document.getElementById('btn-reset').onclick = () => {
    if (ws && ws.readyState === 1) {
      ws.send(JSON.stringify({ action: 'reset' }));
      addLog('🔄 Permintaan reset sensor dikirim.', '');
    } else {
      addLog('⚠️ Tidak terhubung ke server.', 'warn');
    }
  };

  // Auto-connect saat halaman load
  connect();
</script>
</body>
</html>
